<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODUCE 101 SHINSEKAI</title>
    
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        @font-face {
            font-family: 'HakgyoansimBareunDotum';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2310@1.0/HakgyoansimBareunDotumR.woff2') format('woff2');
            font-display: swap;
        }

        body {
            font-family: 'HakgyoansimBareunDotum', sans-serif;
            margin: 0; padding: 0; background-color: #f9f9f9;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 화면용 스타일 */
        .main-logo { width: 100%; max-width: 600px; display: block; margin: 0 auto; }
        .top11-container { width: 100%; max-width: 600px; margin: 20px 0; }
        .pyramid-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .top-card-slot { width: 80px; text-align: center; }
        .image-container { 
            width: 70px; height: 70px; border-radius: 50%; border: 3px solid #0080ff; 
            overflow: hidden; position: relative; background: #eee; 
        }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        .rank-badge { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); background: #0080ff; color: white; font-size: 10px; padding: 1px 5px; border-radius: 5px; }
        .remove-btn { position: absolute; top: 0; right: 0; background: red; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 12px; }
        
        .save-btn { 
            padding: 15px 30px; background: #0080ff; color: white; border: none; 
            border-radius: 30px; font-weight: bold; cursor: pointer; margin: 20px 0;
        }
        .save-btn:disabled { background: #ccc; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; max-width: 600px; }
        .card { border: 1px solid #ddd; padding: 5px; text-align: center; cursor: pointer; background: white; border-radius: 10px; }
        .card img { width: 100%; border-radius: 5px; }

        /* 저장 영역 (화면 밖) */
        #exportArea { position: absolute; left: -9999px; top: 0; width: 1000px; height: 1000px; background: white; }
        #exportInner { width: 1000px; height: 1000px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 60px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <img src="image/header--logo_clean.jpg" class="main-logo">
    <div id="top11" class="top11-container"></div>
    <button id="saveBtn" onclick="saveAsImage()" class="save-btn">나의 TOP 11 이미지로 저장하기</button>
    <div id="trainee-list" class="grid"></div>

    <div id="exportArea">
        <div id="exportInner">
            <div style="text-align: center;">
                <img src="image/header--logo_clean.jpg" style="width: 380px; height: auto; margin-bottom: 20px;">
                <div style="background: #f0f4f8; padding: 12px 45px; border-radius: 50px; font-weight: 900; font-size: 22px; color: #111; display: inline-block;">
                    AUDITION PICK • YOUR TOP 11
                </div>
            </div>
            <div id="exportPyramid" style="display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%;"></div>
            <div style="width: 100%; text-align: center;">
                <span style="font-size: 20px; color: #888; font-weight: bold; letter-spacing: 1px;">@itterashaiyade</span>
            </div>
        </div>
    </div>

    <script src="trainees.js"></script>

    <script>
        let top11 = [];

        function init() {
            const list = document.getElementById("trainee-list");
            if (typeof trainees !== 'undefined') {
                trainees.forEach(t => {
                    const div = document.createElement("div");
                    div.className = "card";
                    div.innerHTML = `<img src="${t.img}" loading="lazy"><p>${t.name}</p>`;
                    div.onclick = () => {
                        if (top11.length < 11 && !top11.includes(t)) {
                            top11.push(t);
                            render();
                        }
                    };
                    list.appendChild(div);
                });
            }
            render();
        }

        function render() {
            const container = document.getElementById("top11");
            container.innerHTML = "";
            const rows = [1, 2, 3, 5];
            let idx = 0;
            rows.forEach(count => {
                const row = document.createElement("div");
                row.className = "pyramid-row";
                for (let i = 0; i < count; i++) {
                    const t = top11[idx];
                    const slot = document.createElement("div");
                    slot.className = "top-card-slot";
                    if (t) {
                        slot.innerHTML = `<div class="image-container"><img src="${t.img}"><div class="rank-badge">${idx + 1}</div><button class="remove-btn" onclick="removeT(${idx})">×</button></div><p style="font-size:12px; margin:5px 0;">${t.name}</p>`;
                    } else {
                        slot.innerHTML = `<div class="image-container"></div><p>-</p>`;
                    }
                    row.appendChild(slot);
                    idx++;
                }
                container.appendChild(row);
            });
        }

        function removeT(i) {
            top11.splice(i, 1);
            render();
        }

        async function saveAsImage() {
            if (top11.length === 0) return alert("연습생을 선택하세요!");
            
            const btn = document.getElementById("saveBtn");
            btn.innerText = "이미지 생성 중...";
            btn.disabled = true;

            const expPyramid = document.getElementById("exportPyramid");
            expPyramid.innerHTML = "";
            
            let idx = 0;
            [1, 2, 3, 5].forEach(count => {
                const row = document.createElement("div");
                row.style.cssText = "display: flex; justify-content: center; gap: 20px; width: 100%;";
                for (let i = 0; i < count; i++) {
                    const t = top11[idx];
                    const slot = document.createElement("div");
                    slot.style.cssText = "width: 140px; text-align: center;";
                    if (t) {
                        // 이미지에 crossorigin="anonymous" 강제 부여 (보안 우회)
                        slot.innerHTML = `
                            <div style="width: 115px; height: 115px; border-radius: 50%; border: 5px solid #0080ff; overflow: hidden; background: #fff; margin: 0 auto; position: relative;">
                                <img src="${t.img}" style="width: 100%; height: 100%; object-fit: cover;" crossorigin="anonymous">
                                <div style="position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); background: #0080ff; color: #fff; border-radius: 10px; font-weight: 900; font-size: 13px; padding: 2px 10px;">${idx + 1}</div>
                            </div>
                            <div style="margin-top: 12px; font-size: 18px; font-weight: 900; color: #111;">${t.name}</div>
                        `;
                    } else {
                        slot.innerHTML = `<div style="width: 115px; height: 115px; border-radius: 50%; background: #f5f5f5; margin: 0 auto;"></div>`;
                    }
                    row.appendChild(slot);
                    idx++;
                }
                expPyramid.appendChild(row);
            });

            try {
                // 이미지가 그려질 때까지 대기
                await new Promise(resolve => setTimeout(resolve, 1000));

                const area = document.getElementById("exportInner");
                const canvas = await html2canvas(area, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    width: 1000,
                    height: 1000,
                    backgroundColor: "#ffffff"
                });

                // 다운로드 로직 (모바일 호환성 강화)
                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download = "MY_TOP11_SQUARE.png";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                console.error(e);
                alert("저장에 실패했습니다. 크롬 브라우저 사용을 권장합니다.");
            } finally {
                btn.innerText = "나의 TOP 11 이미지로 저장하기";
                btn.disabled = false;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
