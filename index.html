<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODUCE 101 SHINSEKAI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="logo-container">
        <img src="image/header--logo_clean.jpg" alt="PRODUCE 101 SHINSEKAI" class="main-logo">
    </div>

    <div id="top11" class="top11-container"></div>

    <div class="button-area">
        <button onclick="saveAsImage()" class="save-btn">나의 TOP 11 이미지로 저장하기</button>
    </div>

    <div id="trainee-list" class="grid"></div>

    <script src="trainees.js"></script>
    <script src="script.js"></script>
 <div id="exportArea" style="position: fixed; left: -9999px; top: 0; width: 1000px; height: 1000px; background: #ffffff; padding: 0; margin: 0; overflow: hidden;">
    <div id="exportInner" style="width: 1000px; height: 1000px; position: relative; background: #ffffff; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 60px 0; box-sizing: border-box;">
        
        <div id="exportBanner" style="text-align: center;">
            <img src="image/header--logo_clean.jpg" style="width: 600px; display: block; margin: 0 auto;">
            <div style="margin-top: 15px; font-weight: 900; letter-spacing: .06em; font-size: 22px; color: #111; font-family: sans-serif;">
                AUDITION PICK • YOUR TOP 11
            </div>
        </div>

        <div id="exportPyramid" style="display: flex; flex-direction: column; gap: 30px; align-items: center; flex-grow: 1; justify-content: center;"></div>

        <div style="width: 100%; text-align: center; padding-bottom: 20px;">
            <span style="font-family: 'HakgyoansimBareunDotum', 'Malgun Gothic', sans-serif; font-size: 18px; color: #888888; font-weight: 600; letter-spacing: 0.05em;">
                created by @itterashaiyade
            </span>
        </div>
    </div>
</div>

<style>
    @font-face {
        font-family: 'HakgyoansimBareunDotum';
        src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2310@1.0/HakgyoansimBareunDotumR.woff2') format('woff2');
        font-weight: normal;
        font-style: normal;
    }
</style>
</body>
</html>
