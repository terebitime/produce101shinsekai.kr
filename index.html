<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODUCE 101 SHINSEKAI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* 학교안심 바른돋움 폰트 로드 */
        @font-face {
            font-family: 'HakgyoansimBareunDotum';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2310@1.0/HakgyoansimBareunDotumR.woff2') format('woff2');
            font-display: swap;
        }

        /* 부모 스타일에 폰트 지정 (더 확실한 적용) */
        body {
            font-family: 'HakgyoansimBareunDotum', sans-serif !important;
        }

        /* 저장 영역의 모든 텍스트 폰트 강제 고정 */
        #exportArea * {
            font-family: 'HakgyoansimBareunDotum', sans-serif !important;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="image/header--logo_clean.jpg" alt="PRODUCE 101 SHINSEKAI" class="main-logo">
    </div>

    <div id="top11" class="top11-container"></div>

    <div class="button-area">
        <button onclick="saveAsImage()" class="save-btn">나의 TOP 11 이미지로 저장하기</button>
    </div>

    
    <div id="trainee-list" class="grid"></div>

    <script src="trainees.js"></script>
    <script src="script.js"></script>

  <div id="exportArea" style="position: fixed; left: -9999px; top: 0; width: 1000px; height: 1000px; background: #ffffff;">
    <div id="exportInner" style="width: 1000px; height: 1000px; display: flex; flex-direction: column; align-items: center; padding-top: 20px;">
        
        <div style="text-align: center; width: 100%; padding: 10px 0;">
            <img src="image/header--logo_clean.jpg" style="width: 500px; height: auto; display: block; margin: 0 auto; object-fit: contain;">
            <div style="margin-top: 10px; font-weight: 900; font-size: 22px; color: #111; letter-spacing: 0.05em;">
                AUDITION PICK • YOUR TOP 11
            </div>
        </div>

        <div id="exportPyramid" style="display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; width: 100%; flex-grow: 1;"></div>

        <div style="width: 100%; text-align: center; padding-bottom: 20px;">
            <span style="font-size: 16px; color: #999;">@itterashaiyade</span>
        </div>
    </div>
</div>
